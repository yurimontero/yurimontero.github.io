<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Política de Privacidad</title>
  <style>
    :root {
      --bg: #f4efe8;
      --bg-accent: #e2ecf6;
      --card: rgba(255, 252, 247, 0.82);
      --card-strong: rgba(255, 255, 255, 0.92);
      --text: #17212b;
      --muted: #5f6b75;
      --line: rgba(23, 33, 43, 0.1);
      --primary: #0e6b68;
      --primary-soft: rgba(14, 107, 104, 0.1);
      --shadow: 0 24px 60px rgba(25, 39, 52, 0.12);
      --radius-xl: 28px;
      --radius-lg: 20px;
      --radius-md: 14px;
      --max-width: 1080px;
    }

    * {
      box-sizing: border-box;
    }

    html {
      scroll-behavior: smooth;
    }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: "Avenir Next", "Segoe UI", sans-serif;
      color: var(--text);
      background:
        radial-gradient(circle at top left, rgba(14, 107, 104, 0.16), transparent 32%),
        radial-gradient(circle at top right, rgba(115, 152, 201, 0.18), transparent 30%),
        linear-gradient(180deg, var(--bg) 0%, #f8f5f1 48%, #f2f7fb 100%);
    }

    body::before {
      content: "";
      position: fixed;
      inset: 0;
      pointer-events: none;
      background-image:
        linear-gradient(rgba(255, 255, 255, 0.06) 1px, transparent 1px),
        linear-gradient(90deg, rgba(255, 255, 255, 0.06) 1px, transparent 1px);
      background-size: 32px 32px;
      mask-image: linear-gradient(180deg, rgba(0, 0, 0, 0.4), transparent 85%);
    }

    .shell {
      width: min(calc(100% - 32px), var(--max-width));
      margin: 0 auto;
      padding: 28px 0 64px;
      position: relative;
      z-index: 1;
    }

    .toolbar {
      display: flex;
      justify-content: flex-end;
      margin-bottom: 20px;
    }

    .lang-switcher {
      display: inline-flex;
      gap: 6px;
      padding: 6px;
      border: 1px solid rgba(255, 255, 255, 0.55);
      border-radius: 999px;
      background: rgba(255, 255, 255, 0.58);
      backdrop-filter: blur(18px);
      box-shadow: 0 12px 32px rgba(23, 33, 43, 0.08);
    }

    .lang-switcher button {
      border: 0;
      background: transparent;
      color: var(--muted);
      padding: 10px 14px;
      border-radius: 999px;
      cursor: pointer;
      font: inherit;
      font-size: 0.92rem;
      font-weight: 700;
      letter-spacing: 0.03em;
      transition: 180ms ease;
    }

    .lang-switcher button:hover {
      color: var(--text);
      background: rgba(255, 255, 255, 0.65);
    }

    .lang-switcher button.active {
      color: white;
      background: linear-gradient(135deg, #0e6b68 0%, #124f76 100%);
      box-shadow: 0 10px 24px rgba(14, 107, 104, 0.22);
    }

    .hero {
      display: grid;
      grid-template-columns: 1.15fr 0.85fr;
      gap: 24px;
      align-items: stretch;
      margin-bottom: 24px;
    }

    .hero-card,
    .summary-card,
    .section-card {
      background: var(--card);
      border: 1px solid rgba(255, 255, 255, 0.55);
      border-radius: var(--radius-xl);
      box-shadow: var(--shadow);
      backdrop-filter: blur(18px);
    }

    .hero-card {
      padding: 34px 34px 30px;
      position: relative;
      overflow: hidden;
    }

    .hero-card::after {
      content: "";
      position: absolute;
      top: -40px;
      right: -50px;
      width: 180px;
      height: 180px;
      border-radius: 50%;
      background: radial-gradient(circle, rgba(14, 107, 104, 0.2), transparent 68%);
    }

    .eyebrow {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 8px 12px;
      border-radius: 999px;
      background: var(--primary-soft);
      color: var(--primary);
      font-size: 0.82rem;
      font-weight: 800;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      margin-bottom: 18px;
    }

    .eyebrow::before {
      content: "";
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: currentColor;
      box-shadow: 0 0 0 6px rgba(14, 107, 104, 0.12);
    }

    h1 {
      margin: 0 0 14px;
      font-size: clamp(2rem, 3.6vw, 3.6rem);
      line-height: 0.96;
      letter-spacing: -0.05em;
    }

    .lead {
      margin: 0;
      max-width: 44rem;
      font-size: 1.05rem;
      line-height: 1.65;
      color: var(--muted);
    }

    .summary-card {
      padding: 28px;
      display: flex;
      flex-direction: column;
      justify-content: space-between;
      gap: 20px;
    }

    .summary-label {
      font-size: 0.86rem;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      font-weight: 800;
      color: var(--primary);
    }

    .updated-date {
      font-size: 1.3rem;
      font-weight: 800;
      margin: 0;
    }

    .summary-note {
      margin: 0;
      color: var(--muted);
      line-height: 1.7;
    }

    .grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 20px;
    }

    .section-card {
      padding: 24px;
      position: relative;
      overflow: hidden;
    }

    .section-card.full {
      grid-column: 1 / -1;
    }

    .section-card::before {
      content: "";
      position: absolute;
      inset: 0 auto auto 0;
      width: 100%;
      height: 4px;
      background: linear-gradient(90deg, var(--primary), rgba(18, 79, 118, 0.26));
    }

    .section-title {
      display: flex;
      align-items: center;
      gap: 12px;
      margin: 0 0 14px;
      font-size: 1.08rem;
      font-weight: 800;
      letter-spacing: -0.02em;
    }

    .section-icon {
      width: 42px;
      height: 42px;
      border-radius: 14px;
      display: inline-grid;
      place-items: center;
      background: linear-gradient(135deg, rgba(14, 107, 104, 0.14), rgba(18, 79, 118, 0.12));
      color: var(--primary);
      font-size: 1.1rem;
      box-shadow: inset 0 0 0 1px rgba(14, 107, 104, 0.08);
    }

    .section-body p,
    .section-body li {
      color: var(--muted);
      line-height: 1.7;
      font-size: 1rem;
    }

    .section-body p {
      margin: 0;
    }

    .section-body ul {
      margin: 0;
      padding-left: 1.15rem;
    }

    .section-body li + li {
      margin-top: 8px;
    }

    .trust-row {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 14px;
      margin-top: 18px;
    }

    .trust-item {
      padding: 14px 16px;
      border-radius: var(--radius-md);
      background: var(--card-strong);
      border: 1px solid var(--line);
    }

    .trust-item strong {
      display: block;
      margin-bottom: 6px;
      font-size: 0.88rem;
      letter-spacing: 0.03em;
      text-transform: uppercase;
    }

    .trust-item span {
      color: var(--muted);
      line-height: 1.5;
      font-size: 0.95rem;
    }

    .footer {
      margin-top: 22px;
      padding: 18px 4px 0;
      text-align: center;
      color: var(--muted);
      font-size: 0.92rem;
    }

    @media (max-width: 880px) {
      .hero,
      .grid {
        grid-template-columns: 1fr;
      }

      .summary-card {
        order: -1;
      }
    }

    @media (max-width: 640px) {
      .shell {
        width: min(calc(100% - 20px), var(--max-width));
        padding-top: 18px;
      }

      .hero-card,
      .summary-card,
      .section-card {
        border-radius: 22px;
      }

      .hero-card,
      .summary-card,
      .section-card {
        padding-left: 20px;
        padding-right: 20px;
      }

      .trust-row {
        grid-template-columns: 1fr;
      }

      .lang-switcher {
        width: 100%;
        justify-content: center;
      }

      .lang-switcher button {
        flex: 1;
      }
    }
  </style>
</head>
<body>
  <div class="shell">
    <div class="toolbar">
      <div class="lang-switcher" role="group" aria-label="Language selector">
        <button type="button" class="active" data-lang-button="es">ES</button>
        <button type="button" data-lang-button="en">EN</button>
        <button type="button" data-lang-button="fr">FR</button>
      </div>
    </div>

    <section class="hero">
      <article class="hero-card">
        <div class="eyebrow" data-i18n="eyebrow"></div>
        <h1 data-i18n="title"></h1>
        <p class="lead" data-i18n="intro"></p>
      </article>

      <aside class="summary-card">
        <div>
          <div class="summary-label" data-i18n="updatedLabel"></div>
          <p class="updated-date" data-i18n="updatedDate"></p>
        </div>
        <p class="summary-note" data-i18n="summaryNote"></p>
      </aside>
    </section>

    <section class="grid">
      <article class="section-card">
        <h2 class="section-title">
          <span class="section-icon">i</span>
          <span data-i18n="sections.collect.title"></span>
        </h2>
        <div class="section-body">
          <p data-i18n="sections.collect.body"></p>
        </div>
      </article>

      <article class="section-card">
        <h2 class="section-title">
          <span class="section-icon">+</span>
          <span data-i18n="sections.use.title"></span>
        </h2>
        <div class="section-body">
          <p data-i18n="sections.use.body"></p>
          <ul>
            <li data-i18n="sections.use.items.0"></li>
          </ul>
        </div>
      </article>

      <article class="section-card">
        <h2 class="section-title">
          <span class="section-icon">D</span>
          <span data-i18n="sections.storage.title"></span>
        </h2>
        <div class="section-body">
          <p data-i18n="sections.storage.body"></p>
        </div>
      </article>

      <article class="section-card">
        <h2 class="section-title">
          <span class="section-icon">S</span>
          <span data-i18n="sections.share.title"></span>
        </h2>
        <div class="section-body">
          <p data-i18n="sections.share.body"></p>
        </div>
      </article>

      <article class="section-card full">
        <h2 class="section-title">
          <span class="section-icon">C</span>
          <span data-i18n="sections.changes.title"></span>
        </h2>
        <div class="section-body">
          <p data-i18n="sections.changes.body"></p>

          <div class="trust-row">
            <div class="trust-item">
              <strong data-i18n="highlights.0.title"></strong>
              <span data-i18n="highlights.0.body"></span>
            </div>
            <div class="trust-item">
              <strong data-i18n="highlights.1.title"></strong>
              <span data-i18n="highlights.1.body"></span>
            </div>
            <div class="trust-item">
              <strong data-i18n="highlights.2.title"></strong>
              <span data-i18n="highlights.2.body"></span>
            </div>
          </div>
        </div>
      </article>
    </section>

    <footer class="footer" data-i18n="footer"></footer>
  </div>

  <script>
    const translations = {
      es: {
        lang: "es",
        pageTitle: "Política de Privacidad",
        eyebrow: "Privacidad de la aplicación",
        title: "Política de Privacidad",
        intro: "Nos comprometemos a proteger la privacidad de nuestros usuarios. Esta política explica de forma clara cómo tratamos la información cuando utilizas la aplicación.",
        updatedLabel: "Última modificación",
        updatedDate: "14 de abril de 2026",
        summaryNote: "La aplicación no recopila datos personales de forma directa. Solo puede procesar información técnica limitada a través de servicios de Google como Firebase Crashlytics para mejorar la estabilidad.",
        sections: {
          collect: {
            title: "Información que recopilamos",
            body: "Esta aplicación no recopila información personal identificable. Únicamente puede recibir datos técnicos relacionados con errores y cierres inesperados mediante Google Firebase Crashlytics."
          },
          use: {
            title: "Uso de la información",
            body: "La información técnica obtenida a través de Crashlytics se utiliza exclusivamente para:",
            items: [
              "Mejorar la estabilidad, el rendimiento y la funcionalidad general de la aplicación."
            ]
          },
          storage: {
            title: "Almacenamiento de datos",
            body: "Los datos propios de uso de la aplicación se almacenan únicamente de forma local en tu dispositivo."
          },
          share: {
            title: "Compartir información",
            body: "No compartimos tu información personal con terceros. Los datos técnicos gestionados por servicios de Google se limitan al funcionamiento propio de dichos servicios."
          },
          changes: {
            title: "Cambios en esta política",
            body: "Nos reservamos el derecho de actualizar esta Política de Privacidad en cualquier momento. Cualquier cambio será publicado en esta misma página."
          }
        },
        highlights: [
          {
            title: "Sin registro obligatorio",
            body: "La aplicación no requiere crear una cuenta para su uso básico."
          },
          {
            title: "Datos locales",
            body: "La información propia de la app permanece en el dispositivo del usuario."
          },
          {
            title: "Enfoque técnico",
            body: "Los informes de fallos solo se usan para mantener y mejorar la app."
          }
        ],
        footer: "Si continúas utilizando la aplicación después de cualquier actualización, se entenderá que aceptas la versión vigente de esta política."
      },
      en: {
        lang: "en",
        pageTitle: "Privacy Policy",
        eyebrow: "App privacy",
        title: "Privacy Policy",
        intro: "We are committed to protecting our users' privacy. This policy clearly explains how information is handled when you use the application.",
        updatedLabel: "Last updated",
        updatedDate: "April 14, 2026",
        summaryNote: "The application does not directly collect personal data. It may only process limited technical diagnostics through Google services such as Firebase Crashlytics in order to improve stability.",
        sections: {
          collect: {
            title: "Information we collect",
            body: "This application does not collect personally identifiable information. It may only receive technical data related to errors and unexpected crashes through Google Firebase Crashlytics."
          },
          use: {
            title: "How information is used",
            body: "Technical information received through Crashlytics is used exclusively to:",
            items: [
              "Improve the app's stability, performance, and overall functionality."
            ]
          },
          storage: {
            title: "Data storage",
            body: "Application data is stored locally on your device only."
          },
          share: {
            title: "Information sharing",
            body: "We do not share your personal information with third parties. Technical data handled by Google services is limited to the normal operation of those services."
          },
          changes: {
            title: "Changes to this policy",
            body: "We reserve the right to update this Privacy Policy at any time. Any changes will be published on this page."
          }
        },
        highlights: [
          {
            title: "No mandatory account",
            body: "The app does not require account creation for its basic use."
          },
          {
            title: "Local storage",
            body: "Application data remains on the user's device."
          },
          {
            title: "Technical purpose only",
            body: "Crash reports are used only to maintain and improve the app."
          }
        ],
        footer: "If you continue using the application after any update, it will be understood that you accept the current version of this policy."
      },
      fr: {
        lang: "fr",
        pageTitle: "Politique de confidentialité",
        eyebrow: "Confidentialité de l'application",
        title: "Politique de confidentialité",
        intro: "Nous nous engageons à protéger la vie privée de nos utilisateurs. Cette politique explique clairement comment les informations sont traitées lorsque vous utilisez l'application.",
        updatedLabel: "Dernière mise à jour",
        updatedDate: "14 avril 2026",
        summaryNote: "L'application ne collecte pas directement de données personnelles. Elle peut uniquement traiter des diagnostics techniques limités via des services Google tels que Firebase Crashlytics afin d'améliorer la stabilité.",
        sections: {
          collect: {
            title: "Informations collectées",
            body: "Cette application ne collecte pas d'informations personnelles identifiables. Elle peut uniquement recevoir des données techniques liées aux erreurs et aux fermetures inattendues via Google Firebase Crashlytics."
          },
          use: {
            title: "Utilisation des informations",
            body: "Les informations techniques obtenues via Crashlytics sont utilisées exclusivement pour :",
            items: [
              "Améliorer la stabilité, les performances et le fonctionnement général de l'application."
            ]
          },
          storage: {
            title: "Stockage des données",
            body: "Les données de l'application sont stockées uniquement localement sur votre appareil."
          },
          share: {
            title: "Partage des informations",
            body: "Nous ne partageons pas vos informations personnelles avec des tiers. Les données techniques traitées par les services Google sont limitées au fonctionnement normal de ces services."
          },
          changes: {
            title: "Modifications de cette politique",
            body: "Nous nous réservons le droit de mettre à jour cette Politique de confidentialité à tout moment. Toute modification sera publiée sur cette page."
          }
        },
        highlights: [
          {
            title: "Aucun compte requis",
            body: "L'application ne nécessite pas la création d'un compte pour son utilisation de base."
          },
          {
            title: "Stockage local",
            body: "Les données de l'application restent sur l'appareil de l'utilisateur."
          },
          {
            title: "Usage technique",
            body: "Les rapports d'erreur sont utilisés uniquement pour maintenir et améliorer l'application."
          }
        ],
        footer: "Si vous continuez à utiliser l'application après une mise à jour, il sera considéré que vous acceptez la version en vigueur de cette politique."
      }
    };

    function getValue(obj, path) {
      return path.split(".").reduce((acc, key) => acc && acc[key], obj);
    }

    function applyLanguage(lang) {
      const content = translations[lang] || translations.es;
      document.documentElement.lang = content.lang;
      document.title = content.pageTitle;

      document.querySelectorAll("[data-i18n]").forEach((element) => {
        const value = getValue(content, element.dataset.i18n);
        if (typeof value === "string") {
          element.textContent = value;
        }
      });

      document.querySelectorAll("[data-lang-button]").forEach((button) => {
        button.classList.toggle("active", button.dataset.langButton === lang);
      });

      localStorage.setItem("privacy-policy-lang", lang);
    }

    const storedLang = localStorage.getItem("privacy-policy-lang");
    const browserLang = (navigator.language || "es").slice(0, 2).toLowerCase();
    const initialLang = translations[storedLang] ? storedLang : (translations[browserLang] ? browserLang : "es");

    document.querySelectorAll("[data-lang-button]").forEach((button) => {
      button.addEventListener("click", () => applyLanguage(button.dataset.langButton));
    });

    applyLanguage(initialLang);
  </script>
</body>
</html>
